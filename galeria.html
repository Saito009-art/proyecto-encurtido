<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Galería de Fotos</title>

<style>

body{
    margin:0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0d6efd, #dc3545);
    color:white;
}

.contenido{
    max-width:1000px;
    margin:auto;
    padding:40px 20px;
    text-align:center;
}

h1{
    font-size:40px;
    margin-bottom:30px;
}

.seccion{
    margin:50px 0;
}

.seccion h2{
    color:#ffe066;
    margin-bottom:25px;
}

.fotos{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.foto{
    padding:10px;
}

img{
    width:200px;
    height:auto;
    border-radius:10px;
}

hr{
    border:1px solid rgba(255,255,255,0.3);
    margin:40px 0;
}

.btn{
    display:inline-block;
    background:white;
    color:#0d6efd;
    text-decoration:none;
    padding:15px 30px;
    border-radius:12px;
    font-size:18px;
    font-weight:bold;
    transition:0.3s;
    box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

.btn:hover{
    background:#ffd43b;
    color:black;
    transform:scale(1.05);
}

</style>

</head>

<body>

<div class="contenido">

    <h1>Galería de Fotos</h1>

    <p>Aqui puedes ver la diferencia entre los proyectos</p>

    <hr>

    <hr>

    <div class="seccion">
        <h2>Equipo 1</h2>

        <div class="fotos">

            <div class="foto">
                <img src="foto1.jpeg" alt="Equipo 2">
            </div>

            <div class="foto">
                <img src="foto2.jpeg" alt="Equipo 2">
            </div>

            <div class="foto">
                <img src="foto3.jpeg" alt="Equipo 2">
            </div>

        </div>
    </div>

    <hr>

    <hr>

    <div class="seccion">
        <h2>Equipo 2</h2>

        <div class="fotos">

            <div class="foto">
                <img src="foto4.jpg" alt="Equipo 3">
            </div>

            <div class="foto">
                <img src="foto5.jpg" alt="Equipo 3">
            </div>

            <div class="foto">
                <img src="foto6.jpg" alt="Equipo 3">
            </div>

        </div>
    </div>

    <hr>

    <a href="menu1.html" class="btn">Volver al Inicio</a>

</div>

</body>
</html>
