<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyecto Escolar - Encurtido de Verduras</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0d6efd,#dc3545);
    font-family:Arial, sans-serif;
}

.contenedor{
    width:100%;
    max-width:550px;
}

.card-login{
    background:white;
    border-radius:20px;
    padding:30px;
    box-shadow:0px 0px 20px rgba(0,0,0,0.3);
}

.logo{
    width:130px;
    height:130px;
    margin:auto;
    border:2px dashed gray;
    border-radius:10px;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f8f9fa;
}

.logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

h2{
    text-align:center;
    margin-top:15px;
    font-weight:bold;
}

.subtitulo{
    text-align:center;
    color:#198754;
    margin-bottom:25px;
}

.form-control,
.form-select{
    background:white;
}

.btn-ingresar{
    background:#198754;
    border:none;
}

.btn-ingresar:hover{
    background:#146c43;
}

</style>
</head>

<body>

<div class="contenedor">

    <div class="card-login">

       
        <div class="logo">
            <img src="vidalogo.jpg" alt="Logo del Colegio">
        </div>

        <h2>Proyecto Escolar</h2>

        <h5 class="subtitulo">
            Encurtido de Verduras
        </h5>

        <form action="menu1.html">

            <div class="mb-3">
                <label class="form-label">Nombre Completo</label>
                <input type="text"
                       class="form-control"
                       placeholder="Ingrese su nombre"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Edad</label>
                <input type="number"
                       class="form-control"
                       placeholder="Ingrese su edad"
                       required>
            </div>

            <div class="mb-3">
                <label class="form-label">Grado</label>

                <select class="form-select" required>

                    <option value="">
                        Seleccione un grado
                    </option>

                    <option>5to Baco</option>
                    <option>5to Gastro</option>
                    <option>5to Biológicas</option>
                    <option>5to Turismo</option>
                    <option>5to Diseño</option>

                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Sección</label>
                <input type="text"
                       class="form-control"
                       placeholder="Ejemplo: A"
                       required>
            </div>

            <div class="mb-3">
    <label class="form-label">Clave</label>
    <input type="number"
           class="form-control"
           placeholder="Ingrese su clave numérica"
           required>
        </div>

            <div class="d-grid">
                <button type="submit"
                        class="btn btn-success btn-ingresar">
                    Ingresar
                </button>
            </div>

        </form>

    </div>

</div>

</body>
</html>
